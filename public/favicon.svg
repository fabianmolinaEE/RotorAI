<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Tire outer ring -->
  <circle cx="16" cy="16" r="15" fill="#0f0f0f" stroke="#333" stroke-width="0.5"/>
  <!-- Tire tread bumps (outer edge) -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#222" stroke-width="3" stroke-dasharray="3.5 2.2"/>
  <!-- Sidewall -->
  <circle cx="16" cy="16" r="11.5" fill="#1a1a1a"/>
  <!-- Rim ring -->
  <circle cx="16" cy="16" r="10" fill="#0a0a0a" stroke="#444" stroke-width="0.75"/>
  <!-- 5 spokes -->
  <g stroke="#555" stroke-width="1.2" stroke-linecap="round">
    <line x1="16" y1="6.5" x2="16" y2="12"/>
    <line x1="16" y1="6.5" x2="16" y2="12" transform="rotate(72 16 16)"/>
    <line x1="16" y1="6.5" x2="16" y2="12" transform="rotate(144 16 16)"/>
    <line x1="16" y1="6.5" x2="16" y2="12" transform="rotate(216 16 16)"/>
    <line x1="16" y1="6.5" x2="16" y2="12" transform="rotate(288 16 16)"/>
  </g>
  <!-- Center hub -->
  <circle cx="16" cy="16" r="5.5" fill="#111" stroke="#555" stroke-width="0.5"/>
  <!-- AI text -->
  <text x="16" y="19.2" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="5.5" font-weight="700" letter-spacing="0.3" fill="#60a5fa">AI</text>
</svg>
